<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corncob EDL - Component Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/corn-cob-dl.css" />
    <script type="module" src="/edl.esm.js"></script>
  </head>
  <body>
    <main>
      <div class="header">
        <h1>
          <svg
            viewBox="0 0 48 48"
            xmlns="http://www.w3.org/2000/svg"
            class="corn-company--logo"
            aria-hidden="true"
          >
            <use href="/corn-cob-dl.svg"></use>
          </svg>
          Corncob EDL
        </h1>
        <p>Enterprise Design Language - A vanilla JavaScript design system</p>
        <div class="theme-toggle">
          <label> <input type="checkbox" id="theme-toggle" /> Dark Mode </label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="component-section">
        <div id="button-demo" class="component-demo"></div>
      </div>

      <!-- Input -->
      <div class="component-section">
        <div id="input-demo" class="component-demo"></div>
      </div>

      <!-- Textarea -->
      <div class="component-section">
        <div id="textarea-demo" class="component-demo"></div>
      </div>

      <!-- Select -->
      <div class="component-section">
        <div id="select-demo" class="component-demo"></div>
      </div>

      <!-- Checkbox -->
      <div class="component-section">
        <div id="checkbox-demo" class="component-demo"></div>
      </div>

      <!-- Radio -->
      <div class="component-section">
        <div id="radio-demo" class="component-demo"></div>
      </div>

      <!-- Toggle -->
      <div class="component-section">
        <div id="toggle-demo" class="component-demo"></div>
      </div>

      <!-- Card -->
      <div class="component-section">
        <div id="card-demo" class="component-demo"></div>
      </div>

      <!-- Modal -->
      <div class="component-section">
        <div id="modal-demo" class="component-demo"></div>
      </div>

      <!-- Tabs -->
      <div class="component-section">
        <div id="tabs-demo" class="component-demo"></div>
      </div>

      <!-- Table -->
      <div class="component-section">
        <div id="table-demo" class="component-demo"></div>
      </div>

      <!-- Tooltip -->
      <div class="component-section">
        <div id="tooltip-demo" class="component-demo"></div>
      </div>

      <!-- Alert -->
      <div class="component-section">
        <div id="alert-demo" class="component-demo"></div>
      </div>

      <!-- Badge -->
      <div class="component-section">
        <div id="badge-demo" class="component-demo"></div>
      </div>

      <!-- Avatar -->
      <div class="component-section">
        <div id="avatar-demo" class="component-demo"></div>
      </div>

      <div class="footer">
        <p>&copy; 2026 Corncob. MIT License.</p>
      </div>
    </main>
  </body>
</html>
