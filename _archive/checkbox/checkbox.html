<!-- Checkbox Component Demo -->
<div class="checkbox-demo">
  <h2>Checkbox</h2>

  <h3>Basic Checkbox</h3>
  <div class="cob-checkbox-group">
    <div class="cob-checkbox">
      <input id="check1" type="checkbox" />
      <label for="check1">Accept terms and conditions</label>
    </div>
    <div class="cob-checkbox">
      <input id="check2" type="checkbox" />
      <label for="check2">Subscribe to our newsletter</label>
    </div>
  </div>

  <h3>Checked State</h3>
  <div class="cob-checkbox">
    <input id="check3" type="checkbox" checked />
    <label for="check3">Already agreed</label>
  </div>

  <h3>Disabled</h3>
  <div class="cob-checkbox-group">
    <div class="cob-checkbox">
      <input id="check4" type="checkbox" disabled />
      <label for="check4">Disabled checkbox</label>
    </div>
    <div class="cob-checkbox">
      <input id="check5" type="checkbox" checked disabled />
      <label for="check5">Disabled and checked</label>
    </div>
  </div>
</div>
