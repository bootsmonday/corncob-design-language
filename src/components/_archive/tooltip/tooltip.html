<!-- Tooltip Component Demo -->
<div class="tooltip-demo">
  <h2>Tooltip</h2>

  <h3>Default (Top)</h3>
  <cob-tooltip class="cob-tooltip">
    <button class="cob-button cob-button--primary">Hover me</button>
    <span class="cob-tooltip-text">This is a tooltip</span>
  </cob-tooltip>

  <h3>Right Position</h3>
  <cob-tooltip class="cob-tooltip cob-tooltip--right">
    <button class="cob-button cob-button--primary">Hover me</button>
    <span class="cob-tooltip-text">Right tooltip</span>
  </cob-tooltip>

  <h3>Bottom Position</h3>
  <cob-tooltip class="cob-tooltip cob-tooltip--bottom">
    <button class="cob-button cob-button--primary">Hover me</button>
    <span class="cob-tooltip-text">Bottom tooltip</span>
  </cob-tooltip>

  <h3>Left Position</h3>
  <cob-tooltip class="cob-tooltip cob-tooltip--left">
    <button class="cob-button cob-button--primary">Hover me</button>
    <span class="cob-tooltip-text">Left tooltip</span>
  </cob-tooltip>
</div>
