<!-- Textarea Component Demo -->
<div class="textarea-demo">
  <h2>Textarea</h2>

  <h3>Basic Textarea</h3>
  <div class="cob-textarea">
    <label class="cob-label" for="message">Message</label>
    <textarea id="message" placeholder="Enter your message..."></textarea>
  </div>

  <h3>With Character Count</h3>
  <div class="cob-textarea">
    <label class="cob-label" for="bio">Bio</label>
    <textarea id="bio" maxlength="200" placeholder="Tell us about yourself..."></textarea>
    <div class="cob-textarea__char-count">0/200</div>
  </div>

  <h3>Disabled</h3>
  <div class="cob-textarea">
    <label class="cob-label">Disabled Textarea</label>
    <textarea disabled placeholder="This is disabled..."></textarea>
  </div>
</div>
