<!-- Select Component Demo -->
<div class="select-demo">
  <h2>Select</h2>

  <h3>Basic Select</h3>
  <cob-select>
    <button class="cob-select-trigger" role="button">Select an option</button>
    <div class="cob-select-menu" role="listbox">
      <div class="cob-select-option" role="option" value="1">Option 1</div>
      <div class="cob-select-option" role="option" value="2">Option 2</div>
      <div class="cob-select-option" role="option" value="3">Option 3</div>
      <div class="cob-select-option" role="option" value="4">Option 4</div>
    </div>
  </cob-select>

  <h3>Select with Groups</h3>
  <cob-select>
    <button class="cob-select-trigger" role="button">Choose a country</button>
    <div class="cob-select-menu" role="listbox">
      <div
        style="
          padding: var(--spacing-md) var(--spacing-lg);
          font-weight: bold;
          color: var(--color-text-secondary);
        "
      >
        North America
      </div>
      <div class="cob-select-option" role="option" value="usa">United States</div>
      <div class="cob-select-option" role="option" value="canada">Canada</div>
      <div
        style="
          padding: var(--spacing-md) var(--spacing-lg);
          font-weight: bold;
          color: var(--color-text-secondary);
        "
      >
        Europe
      </div>
      <div class="cob-select-option" role="option" value="uk">United Kingdom</div>
      <div class="cob-select-option" role="option" value="france">France</div>
    </div>
  </cob-select>
</div>
