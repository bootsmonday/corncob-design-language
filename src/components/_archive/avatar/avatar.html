<!-- Avatar Component Demo -->
<div class="avatar-demo">
  <h2>Avatar</h2>

  <h3>With Initials</h3>
  <cob-avatar class="cob-avatar cob-avatar--primary" initials="JD"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--secondary" initials="JS"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--success" initials="AW"></cob-avatar>

  <h3>Sizes</h3>
  <cob-avatar class="cob-avatar cob-avatar--xs" initials="XS"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--sm" initials="SM"></cob-avatar>
  <cob-avatar class="cob-avatar" initials="MD"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--lg" initials="LG"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--xl" initials="XL"></cob-avatar>

  <h3>With Image</h3>
  <cob-avatar class="cob-avatar" src="https://via.placeholder.com/40"></cob-avatar>

  <h3>Color Variants</h3>
  <cob-avatar class="cob-avatar cob-avatar--primary" initials="P"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--secondary" initials="S"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--success" initials="S"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--danger" initials="D"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--warning" initials="W"></cob-avatar>
  <cob-avatar class="cob-avatar cob-avatar--info" initials="I"></cob-avatar>

  <h3>Avatar Group</h3>
  <div class="cob-avatar-group">
    <cob-avatar class="cob-avatar cob-avatar--primary" initials="A"></cob-avatar>
    <cob-avatar class="cob-avatar cob-avatar--secondary" initials="B"></cob-avatar>
    <cob-avatar class="cob-avatar cob-avatar--success" initials="C"></cob-avatar>
  </div>
</div>
