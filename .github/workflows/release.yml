name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history needed so changesets can diff versions
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@bootsmonday'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Build wrapper packages
        run: npm run wrappers:build

      # When changesets exist on main:
      #   → Creates (or updates) a "Version Packages" PR with bumped versions
      #     and updated CHANGELOG entries.
      # When the "Version Packages" PR is merged to main:
      #   → Publishes all changed packages to GitHub Packages registry.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # Run `changeset version` to bump versions and update CHANGELOGs
          version: npm run changeset:version
          # Run `changeset publish` to publish packages after the release PR merges
          publish: npm run changeset:publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
