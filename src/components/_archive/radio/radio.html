<!-- Radio Component Demo -->
<div class="radio-demo">
  <h2>Radio</h2>

  <h3>Basic Radio Group</h3>
  <div class="cob-radio-group">
    <div class="cob-radio">
      <input id="radio1" type="radio" name="choice" value="1" />
      <label for="radio1">Option 1</label>
    </div>
    <div class="cob-radio">
      <input id="radio2" type="radio" name="choice" value="2" />
      <label for="radio2">Option 2</label>
    </div>
    <div class="cob-radio">
      <input id="radio3" type="radio" name="choice" value="3" />
      <label for="radio3">Option 3</label>
    </div>
  </div>

  <h3>Checked by Default</h3>
  <div class="cob-radio-group">
    <div class="cob-radio">
      <input id="radio4" type="radio" name="preference" value="yes" checked />
      <label for="radio4">Yes</label>
    </div>
    <div class="cob-radio">
      <input id="radio5" type="radio" name="preference" value="no" />
      <label for="radio5">No</label>
    </div>
  </div>

  <h3>Disabled</h3>
  <div class="cob-radio-group">
    <div class="cob-radio">
      <input id="radio6" type="radio" name="disabled" disabled />
      <label for="radio6">Disabled option</label>
    </div>
    <div class="cob-radio">
      <input id="radio7" type="radio" name="disabled" checked disabled />
      <label for="radio7">Disabled and checked</label>
    </div>
  </div>
</div>
