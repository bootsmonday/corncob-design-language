<!-- Button Component Demo -->
<div class="button-demo">
  <h2>Buttons</h2>

  <h3>Extra Small (xs)</h3>
  <div class="corn-form--row">
    <button class="corn-button corn-button--xs">XS Button</button>
    <button class="corn-button corn-button--xs corn-button--secondary">XS Secondary</button>
    <button class="corn-button corn-button--xs corn-button--danger">XS Danger</button>
    <button class="corn-button corn-button--xs corn-button" disabled>XS Disabled</button>
  </div>
  <h3>Small (sm)</h3>
  <div class="corn-form--row">
    <button class="corn-button corn-button--sm">SM Button</button>
    <button class="corn-button corn-button--sm corn-button--secondary">SM Secondary</button>
    <button class="corn-button corn-button--sm corn-button--danger">SM Danger</button>
    <button class="corn-button corn-button--sm corn-button" disabled>SM Disabled</button>
  </div>
  <h3>Default Medium (md)</h3>
  <div class="corn-form--row">
    <button class="corn-button corn-button--md">MD Button</button>
    <button class="corn-button corn-button--md corn-button--secondary">MD Secondary</button>
    <button class="corn-button corn-button--md corn-button--danger">MD Danger</button>
    <button class="corn-button corn-button--md corn-button" disabled>MD Disabled</button>
  </div>
  <h3>Large (lg)</h3>
  <div class="corn-form--row">
    <button class="corn-button corn-button--lg">LG Button</button>
    <button class="corn-button corn-button--lg corn-button--secondary">LG Secondary</button>
    <button class="corn-button corn-button--lg corn-button--danger">LG Danger</button>
    <button class="corn-button corn-button--lg corn-button" disabled>LG Disabled</button>
  </div>
  <h3>Extra Large (xl)</h3>
  <div class="corn-form--row">
    <button class="corn-button corn-button--xl">XL Button</button>
    <button class="corn-button corn-button--xl corn-button--secondary">XL Secondary</button>
    <button class="corn-button corn-button--xl corn-button--danger">XL Danger</button>
    <button class="corn-button corn-button--xl corn-button" disabled>XL Disabled</button>
  </div>
  <h3>Sizes</h3>
  <button class="corn-button corn-button--sm corn-button--primary">Small</button>
  <button class="corn-button corn-button--primary">Medium</button>
  <button class="corn-button corn-button--lg corn-button--primary">Large</button>

  <h3>Icon Only</h3>
  <button class="corn-button corn-button--icon-only corn-button--primary" aria-label="Close">
    ✕
  </button>

  <h3>Disabled</h3>
  <button class="corn-button corn-button--primary" disabled>Disabled Button</button>

  <h3>Loading</h3>
  <corn-button class="corn-button corn-button--primary corn-button--loading" loading
    >Loading...</corn-button
  >
</div>
