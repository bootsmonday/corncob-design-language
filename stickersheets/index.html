<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corncob EDL - Component Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      // Import all components
      import '/src/index.js';

    </script>    
  </head>
  <body>
    <main>
      <div class="header">
        <h1>🌽 Corncob EDL</h1>
        <p>Enterprise Design Language - A vanilla JavaScript design system</p>
        <div class="theme-toggle">
          <label> <input type="checkbox" id="theme-toggle" /> Dark Mode </label>
        </div>
      </div>
      <div class="main">

      
      <!-- Buttons -->
      <div class="component-section">
        <div id="button-demo" class="component-demo"></div>
      </div>
    </div>
     
    <script type="module">
      // Import all components
      import '/src/index.js';

      // Dynamically load demo HTML
      async function loadDemo(componentName, demoid) {
        console.log(`Loading demo for ${componentName} into ${demoid}`);
        try {
          const response = await fetch(`../src/components/${componentName}/${componentName}.html`);
          const html = await response.text();
          const container = document.getElementById(demoid);
          console.log(`Fetched demo for ${componentName}:`, html);
          if (container) {
            container.innerHTML = html;
          }
        } catch (error) {
          console.error(`Failed to load demo for ${componentName}:`, error);
        }
      }

      // Load all demos
      const components = [
        'button',
      ];

      components.forEach((component) => {
        loadDemo(component, `${component}-demo`);
      });

      // Theme toggle
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;

      // Check for saved theme preference or default to light mode
      const currentTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', currentTheme === 'dark' ? 'dark' : 'light');
      themeToggle.checked = currentTheme === 'dark';

      themeToggle.addEventListener('change', () => {
        const newTheme = themeToggle.checked ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });
    </script>
  </body>
</html>
