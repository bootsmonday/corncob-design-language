<!-- Table Component Demo -->
<div class="table-demo">
  <h2>Table</h2>

  <h3>Basic Table</h3>
  <div class="cob-table-wrapper">
    <cob-table>
      <table class="cob-table --striped">
        <thead>
          <tr>
            <th data-sortable>Name</th>
            <th data-sortable>Email</th>
            <th data-sortable>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>John Doe</td>
            <td>john@example.com</td>
            <td>Active</td>
            <td><button class="cob-button cob-button--sm cob-button--primary">Edit</button></td>
          </tr>
          <tr>
            <td>Jane Smith</td>
            <td>jane@example.com</td>
            <td>Active</td>
            <td><button class="cob-button cob-button--sm cob-button--primary">Edit</button></td>
          </tr>
          <tr>
            <td>Bob Johnson</td>
            <td>bob@example.com</td>
            <td>Inactive</td>
            <td><button class="cob-button cob-button--sm cob-button--primary">Edit</button></td>
          </tr>
        </tbody>
      </table>
    </cob-table>
  </div>
</div>
