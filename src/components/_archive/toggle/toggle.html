<!-- Toggle Component Demo -->
<div class="toggle-demo">
  <h2>Toggle / Switch</h2>

  <h3>Basic Toggle</h3>
  <div class="cob-toggle">
    <input id="toggle1" type="checkbox" />
    <label for="toggle1">Enable notifications</label>
  </div>

  <h3>Toggled On</h3>
  <div class="cob-toggle">
    <input id="toggle2" type="checkbox" checked />
    <label for="toggle2">Dark mode</label>
  </div>

  <h3>Disabled</h3>
  <div class="cob-toggle">
    <input id="toggle3" type="checkbox" disabled />
    <label for="toggle3">Disabled toggle</label>
  </div>

  <h3>Disabled and On</h3>
  <div class="cob-toggle">
    <input id="toggle4" type="checkbox" checked disabled />
    <label for="toggle4">Disabled and on</label>
  </div>
</div>
