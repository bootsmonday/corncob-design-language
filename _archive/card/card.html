<!-- Card Component Demo -->
<div class="card-demo">
  <h2>Card</h2>

  <h3>Basic Card</h3>
  <cob-card class="cob-card">
    <div class="cob-card__header">
      <h3>Card Title</h3>
    </div>
    <div class="cob-card__body">
      <p>This is a basic card with header and body. It uses box shadows and clean spacing.</p>
    </div>
  </cob-card>

  <h3>Card with Media</h3>
  <cob-card class="cob-card">
    <img class="cob-card__media" src="https://via.placeholder.com/400x200" alt="Card media" />
    <div class="cob-card__body">
      <h4>Image Card</h4>
      <p>This card includes an image at the top with content below.</p>
    </div>
  </cob-card>

  <h3>Card with Footer</h3>
  <cob-card class="cob-card">
    <div class="cob-card__header">
      <h3>Actions</h3>
    </div>
    <div class="cob-card__body">
      <p>This card has footer actions for user interaction.</p>
    </div>
    <div class="cob-card__footer">
      <button class="cob-button cob-button--outline">Cancel</button>
      <button class="cob-button cob-button--primary">Save</button>
    </div>
  </cob-card>
</div>
