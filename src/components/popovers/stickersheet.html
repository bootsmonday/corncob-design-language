<!-- Popover Component Demo -->
<div class="popover-demo">
  <h2>Corn Popover</h2>

  <h3>Default (Top)</h3>
  <div class="corn-popover--anchor">
    <button class="corn-button corn-pop" aria-controls="popover-top">Default (Top)</button>
    <corn-popover position="top" id="popover-top" class="corn-popover">
      <ul>
        <li><a href="#">Item 1</a></li>
        <li><a href="#">Item 2</a></li>
        <li><a href="#">Item 3</a></li>
      </ul>
    </corn-popover>
  </div>

  <h3>Right Position</h3>
  <div class="corn-popover--anchor">
    <button class="corn-button corn-pop" aria-controls="popover-right">Right</button>
    <corn-popover position="right" id="popover-right" class="corn-popover">
      <ul>
        <li><a href="#">Item 1</a></li>
        <li><a href="#">Item 2</a></li>
        <li><a href="#">Item 3</a></li>
      </ul>
    </corn-popover>
  </div>
  <h3>Bottom Position</h3>
  <div class="corn-popover--anchor">
    <button class="corn-button corn-pop" aria-controls="popover-bottom">Bottom</button>
    <corn-popover position="bottom" id="popover-bottom" class="corn-popover">
      <ul>
        <li><a href="#">Item 1</a></li>
        <li><a href="#">Item 2</a></li>
        <li><a href="#">Item 3</a></li>
      </ul>
    </corn-popover>
  </div>

  <h3>Left Position</h3>
  <div class="corn-popover--anchor">
    <button class="corn-button corn-pop" aria-controls="popover-left">Left</button>
    <corn-popover position="left" id="popover-left" class="corn-popover">
      <ul>
        <li><a href="#">Item 1</a></li>
        <li><a href="#">Item 2</a></li>
        <li><a href="#">Item 3</a></li>
      </ul>
    </corn-popover>
  </div>

  <h3>Nested Bottom Position</h3>
  <div class="corn-popover--anchor">
    <button class="corn-button corn-pop" aria-controls="nest-popover-bottom">Nested Bottom</button>
    <corn-popover position="bottom" id="nest-popover-bottom" class="corn-popover">
      <ul>
        <li><a href="#">Item 1</a></li>
        <li><a href="#">Item 2</a></li>
        <li>
          <div class="corn-popover--anchor">
            <button class="corn-button corn-pop corn-button--xs" aria-controls="nest-popover-right">
              nested right
            </button>
            <corn-popover position="right" id="nest-popover-right" class="corn-popover">
              <ul>
                <li><a href="#">Item 1</a></li>
                <li><a href="#">Item 2</a></li>
                <li><a href="#">Item 3</a></li>
              </ul>
            </corn-popover>
          </div>
        </li>
      </ul>
    </corn-popover>
  </div>
</div>
