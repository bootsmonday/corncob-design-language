<div class="stickersheet-controls">
  <h2>Controls</h2>
  <div class="corn-form--row">
    <button class="corn-button corn-button--xs" id="default-state">Default</button>
    <button class="corn-button corn-button--xs" id="error-state">Error</button>
    <button class="corn-button corn-button--xs" id="warning-state">Warning</button>
    <button class="corn-button corn-button--xs" id="success-state">Success</button>
    <button class="corn-button corn-button--xs" id="disable">Disable</button>
    <button class="corn-button corn-button--xs" id="enable">Enable</button>
  </div>
  <div>Current State: <span id="current-state">default</span></div>
  <script src="./src/stickersheet.js"></script>
</div>
