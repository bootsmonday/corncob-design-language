<!-- Tooltip Component Demo -->
<div class="tooltip-demo">
  <h2>Corn Tooltip</h2>

  <h3>Default (Top)</h3>

  <button class="corn-button corn-tooltip">
    Default (Top)
    <corn-tooltip position="top">Default tooltip</corn-tooltip>
  </button>

  <h3>Right Position</h3>
  <button class="corn-button corn-tooltip">
    Right
    <corn-tooltip position="right">Right tooltip</corn-tooltip>
  </button>

  <h3>Bottom Position</h3>
  <button class="corn-button corn-tooltip">
    Bottom
    <corn-tooltip position="bottom">Bottom tooltip</corn-tooltip>
  </button>

  <h3>Left Position</h3>
  <button class="corn-button corn-tooltip">
    Left
    <corn-tooltip position="left">Left tooltip</corn-tooltip>
  </button>
</div>
