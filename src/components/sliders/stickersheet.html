<!-- Slider Component Demo -->
<div class="slider-demo">
  <h2>Corn Slider</h2>
  <h3>Default (md)</h3>
  <div class="corn-form--row">
    <div class="corn-form--item">
      <div class="corn-slider">
        <label for="slider">Adjust the Corn Slider:</label>
        <input type="range" min="0" max="100" value="50" id="slider" name="slider" />
      </div>
    </div>
  </div>
  <h3>Extra Small (xs)</h3>
  <div class="corn-slider corn-slider--xs">
    <label for="cornSliderXs">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderXs" />
  </div>
  <h3>Small (sm)</h3>
  <div class="corn-slider corn-slider--sm">
    <label for="slider2">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="slider2" name="slider2" />
  </div>
  <h3>Large (lg)</h3>
  <div class="corn-slider corn-slider--lg">
    <label for="slider3">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="slider3" name="slider3" />
  </div>
  <h3>Extra Large (xl)</h3>
  <div class="corn-slider corn-slider--xl">
    <label for="slider4">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="slider4" name="slider4" />
  </div>
  <h3>Disabled</h3>
  <div class="corn-slider">
    <label for="slider5">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="slider5" name="slider5" disabled />
  </div>
</div>
