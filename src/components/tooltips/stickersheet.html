<!-- Tooltip Component Demo -->
<div class="tooltip-demo">
  <h2>Corn Tooltip</h2>

  <h3>Default (Top)</h3>

  <button class="corn-button corn-tooltip--anchor">
    Default (Top)
    <corn-tooltip position="top" class="corn-tooltip">Default tooltip</corn-tooltip>
  </button>

  <h3>Right Position</h3>
  <button class="corn-button corn-tooltip--anchor">
    Right
    <corn-tooltip position="right" class="corn-tooltip">Right tooltip</corn-tooltip>
  </button>

  <h3>Bottom Position</h3>
  <button class="corn-button corn-tooltip--anchor">
    Bottom
    <corn-tooltip position="bottom" class="corn-tooltip">Bottom tooltip</corn-tooltip>
  </button>

  <h3>Left Position</h3>
  <button class="corn-button corn-tooltip--anchor">
    Left
    <corn-tooltip position="left" class="corn-tooltip">Left tooltip</corn-tooltip>
  </button>
</div>
