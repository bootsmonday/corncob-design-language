<!-- Slider Component Demo -->
<div class="slider-demo">
  <h2>Corn Slider</h2>
  <h3>Default (md)</h3>
  <div class="corn-form--row">
    <div class="corn-form--item">
      <div class="corn-slider">
        <label for="cornSlider">Adjust the Corn Slider:</label>
        <input type="range" min="0" max="100" value="50" id="cornSlider" />
      </div>
    </div>
  </div>
  <h3>Extra Small (xs)</h3>
  <div class="corn-slider corn-slider--xs">
    <label for="cornSliderXs">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderXs" />
  </div>
  <h3>Small (sm)</h3>
  <div class="corn-slider corn-slider--sm">
    <label for="cornSliderSm">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderSm" />
  </div>
  <h3>Large (lg)</h3>
  <div class="corn-slider corn-slider--lg">
    <label for="cornSliderLg">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderLg" />
  </div>
  <h3>Extra Large (xl)</h3>
  <div class="corn-slider corn-slider--xl">
    <label for="cornSliderXl">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderXl" />
  </div>
  <h3>Disabled</h3>
  <div class="corn-slider">
    <label for="cornSliderDisabled">Adjust the Corn Slider:</label>
    <input type="range" min="0" max="100" value="50" id="cornSliderDisabled" disabled />
  </div>
</div>
