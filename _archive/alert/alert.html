<!-- Alert Component Demo -->
<div class="alert-demo">
  <h2>Alert / Banner</h2>

  <h3>Success</h3>
  <cob-alert class="cob-alert cob-alert--success" role="alert">
    <span class="cob-alert__icon">✓</span>
    <div class="cob-alert__content">
      <div class="cob-alert__title">Success!</div>
      <p>Your action was completed successfully.</p>
    </div>
    <button class="cob-alert__close" aria-label="Close">✕</button>
  </cob-alert>

  <h3>Info</h3>
  <cob-alert class="cob-alert cob-alert--info" role="alert">
    <span class="cob-alert__icon">ℹ</span>
    <div class="cob-alert__content">
      <div class="cob-alert__title">Information</div>
      <p>This is some informational content.</p>
    </div>
    <button class="cob-alert__close" aria-label="Close">✕</button>
  </cob-alert>

  <h3>Warning</h3>
  <cob-alert class="cob-alert cob-alert--warning" role="alert">
    <span class="cob-alert__icon">⚠</span>
    <div class="cob-alert__content">
      <div class="cob-alert__title">Warning</div>
      <p>Please be careful with this action.</p>
    </div>
    <button class="cob-alert__close" aria-label="Close">✕</button>
  </cob-alert>

  <h3>Danger</h3>
  <cob-alert class="cob-alert cob-alert--danger" role="alert">
    <span class="cob-alert__icon">✕</span>
    <div class="cob-alert__content">
      <div class="cob-alert__title">Error</div>
      <p>Something went wrong. Please try again.</p>
    </div>
    <button class="cob-alert__close" aria-label="Close">✕</button>
  </cob-alert>
</div>
